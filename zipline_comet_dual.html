
<style>
@property --a { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
@keyframes spn { to { --a: 360deg; } }

.stage {
  border-radius: 14px;
  padding: 52px 24px 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 44px;
  font-family: -apple-system, system-ui, sans-serif;
  transition: background 0.35s;
}
.dk { background: #05090f; }
.lt { background: #e8f2fa; }

.c-shell {
  position: relative;
  display: inline-block;
}

.c-halo {
  position: absolute;
  inset: -5px;
  border-radius: 30px;
  z-index: 0;
  pointer-events: none;
  animation: spn 2.2s linear infinite;
  filter: blur(9px);
  opacity: 0.75;
  background: conic-gradient(from var(--a),
    transparent 0deg, transparent 148deg,
    #000c20 162deg, #001e60 178deg,
    #004aaa 196deg, #007fd0 213deg,
    #00aaee 228deg, #50d8ff 240deg,
    #a8f0ff 249deg, #ffffff 255deg,
    transparent 262deg, transparent 360deg
  );
}
.c-halo.b { animation-delay: -1.1s; }
.lt .c-halo { opacity: 0.35; filter: blur(7px); }

.c-ring {
  position: absolute;
  inset: -2px;
  border-radius: 27px;
  z-index: 1;
  pointer-events: none;
  animation: spn 2.2s linear infinite;
  background: conic-gradient(from var(--a),
    transparent 0deg, transparent 148deg,
    #000c20 162deg, #001e60 178deg,
    #004aaa 196deg, #007fd0 213deg,
    #00aaee 228deg, #50d8ff 240deg,
    #a8f0ff 249deg, #ffffff 255deg,
    transparent 262deg, transparent 360deg
  );
}
.c-ring.b { animation-delay: -1.1s; }

.zb {
  display: block;
  position: relative;
  z-index: 2;
  width: 340px;
  height: 50px;
  border: none;
  border-radius: 25px;
  font-size: 14.5px;
  font-weight: 500;
  letter-spacing: .022em;
  cursor: pointer;
  font-family: inherit;
}
.dk .zb { background: #060d1a; color: #9ad0f5; }
.lt .zb { background: #f4f9ff; color: #083060; }

.tog-row { display: flex; gap: 8px; align-items: center; }
.tog-lbl { font-size: 11px; letter-spacing: .08em; }
.dk .tog-lbl { color: #1e3a54; }
.lt .tog-lbl { color: #88aacc; }
.tb {
  border-radius: 20px; font-size: 12px; padding: 5px 15px;
  cursor: pointer; font-family: inherit; font-weight: 500; transition: all .18s;
}
.dk .tb { background: #08121e; border: 1px solid #122238; color: #2a5878; }
.dk .tb.on { border-color: #0095cc; color: #38c0ee; background: #050d18; }
.lt .tb { background: #dce8f4; border: 1px solid #aac4dc; color: #4888b8; }
.lt .tb.on { border-color: #0065b0; color: #004488; background: #d0e4f5; }
</style>

<div class="stage dk" id="st">
  <div class="c-shell">
    <div class="c-halo"></div>
    <div class="c-halo b"></div>
    <div class="c-ring"></div>
    <div class="c-ring b"></div>
    <button class="zb">Get Answers with Zipline Summary</button>
  </div>

  <div class="tog-row">
    <span class="tog-lbl">Theme</span>
    <button class="tb on" id="bdk" onclick="setT('dk')">Dark</button>
    <button class="tb" id="blt" onclick="setT('lt')">Light</button>
  </div>
</div>

<script>
function setT(m) {
  const isDk = m === 'dk';
  document.getElementById('st').className = 'stage ' + m;
  document.getElementById('bdk').className = 'tb' + (isDk ? ' on' : '');
  document.getElementById('blt').className = 'tb' + (!isDk ? ' on' : '');
}
</script>
