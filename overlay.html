<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open Chat</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: #1558b0;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    #overlay.active {
      display: flex;
    }

    #modal {
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 80vh;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    #close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 22px;
      cursor: pointer;
      background: none;
      border: none;
      color: #333;
      z-index: 10;
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <button onclick="document.getElementById('overlay').classList.add('active')">Open Chat</button>

  <div id="overlay" onclick="closeOverlay(event)">
    <div id="modal">
      <button id="close-btn" onclick="document.getElementById('overlay').classList.remove('active')">✕</button>
      <iframe src="https://chat.the-info-wire.com/results?content=what%27s%20the%20best%20TV%20for%20home%20use%3F&channelid=00300"></iframe>
    </div>
  </div>

  <script>
    function closeOverlay(e) {
      if (e.target === document.getElementById('overlay')) {
        document.getElementById('overlay').classList.remove('active');
      }
    }
  </script>

</body>
</html>
